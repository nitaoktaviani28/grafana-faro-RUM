name: Build & Push to ACR

# Trigger setiap ada push ke branch manapun
on:
  push:
    branches:
      - "**"

env:
  ACR_NAME: imagelcpprd
  ACR_LOGIN_SERVER: imagelcpprd.azurecr.io
  IMAGE_NAME: rum-shop

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set image tag dari SHA commit (7 karakter) ────────────────────
      #    Format: sha-a1b2c3d
      #    Unik per commit, tidak pernah overwrite
      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "→ Image tag: sha-${SHORT_SHA}"
          echo "→ Full image: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"

      # ── 3. Login ke ACR ──────────────────────────────────────────────────
      #    Butuh secrets: ACR_USERNAME dan ACR_PASSWORD
      #    Cara lihat password ACR, jalankan di terminal kamu:
      #
      #      az acr credential show --name imagelcpprd --query "passwords[0].value" -o tsv
      #
      #    Lalu simpan hasilnya ke GitHub Secrets:
      #      Settings → Secrets and variables → Actions → New repository secret
      #      Name: ACR_USERNAME  → Value: imagelcpprd
      #      Name: ACR_PASSWORD  → Value: <output command di atas>
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 4. Setup Docker Buildx (untuk cache & multi-platform) ────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & Push ──────────────────────────────────────────────────
      #    Tag yang dipakai: sha-<7char>
      #    Tidak ada tag latest — setiap push punya tag unik
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.FULL_IMAGE }}
          # PAKSA ARSITEKTUR KE LINUX AMD64 AGAR SESUAI DENGAN NODE AKS 🚀
          platforms: linux/amd64
          # Cache layer di GitHub Actions cache — mempercepat build berikutnya
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args (opsional)
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      # ── 6. Print summary ─────────────────────────────────────────────────
      - name: Print image info
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Image berhasil di-push!"
          echo "   Registry : ${{ env.ACR_LOGIN_SERVER }}"
          echo "   Image    : ${{ env.IMAGE_NAME }}"
          echo "   Tag      : ${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "   Full ref : ${{ steps.vars.outputs.FULL_IMAGE }}"
          echo "   Branch   : ${{ github.ref_name }}"
          echo "   Commit   : ${{ github.sha }}"
          echo "════════════════════════════════════════"
          echo ""
          echo "Update deployment.yaml dengan image baru:"
          echo "  image: ${{ steps.vars.outputs.FULL_IMAGE }}"
