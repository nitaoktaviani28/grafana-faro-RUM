name: Build & Push to ACR

on:
  push:
    branches:
      - "**"

env:
  ACR_NAME: imagelcpprd
  ACR_LOGIN_SERVER: imagelcpprd.azurecr.io
  IMAGE_NAME: rum-shop

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set image tag dari SHA commit (7 karakter) ────────────────────
      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "IMAGE_TAG=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "→ Image tag: sha-${SHORT_SHA}"
          echo "→ Full image: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"

      # ── 3. Login ke ACR ──────────────────────────────────────────────────
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 4. Setup QEMU — diperlukan untuk cross-platform build ─────────────
      #    AKS node berjalan di linux/amd64, runner GitHub bisa arm64
      #    QEMU memastikan image selalu di-build untuk linux/amd64
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 5. Setup Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Build & Push ───────────────────────────────────────────────────
      #    platforms: linux/amd64 → sesuai AKS node architecture
      #    Tag: sha-<7char>, tidak ada latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.FULL_IMAGE }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}

      # ── 7. Print summary ──────────────────────────────────────────────────
      - name: Print image info
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Image berhasil di-push!"
          echo "   Registry : ${{ env.ACR_LOGIN_SERVER }}"
          echo "   Image    : ${{ env.IMAGE_NAME }}"
          echo "   Tag      : ${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "   Full ref : ${{ steps.vars.outputs.FULL_IMAGE }}"
          echo "   Branch   : ${{ github.ref_name }}"
          echo "   Commit   : ${{ github.sha }}"
          echo "════════════════════════════════════════"
          echo ""
          echo "Update deployment.yaml dengan image baru:"
          echo "  image: ${{ steps.vars.outputs.FULL_IMAGE }}"
