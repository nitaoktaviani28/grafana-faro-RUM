name: Build & Push to Docker Hub

on:
  push:
    branches:
      - "**"

env:
  IMAGE_NAME: rum-shop

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set image tag ──────────────────────────────────────────────────
      #    Format: v1, v2, v3, ... naik otomatis berdasarkan jumlah push
      #    Atau pakai run_number dari GitHub Actions (1, 2, 3, ...)
      - name: Set image tag
        id: vars
        run: |
          TAG="v${{ github.run_number }}"
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_OUTPUT
          echo "FULL_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT
          echo "→ Image tag: ${TAG}"
          echo "→ Full image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${TAG}"

      # ── 3. Login ke Docker Hub ────────────────────────────────────────────
      #    Simpan ke GitHub Secrets:
      #      DOCKERHUB_USERNAME  → username Docker Hub kamu
      #      DOCKERHUB_TOKEN     → Access Token (bukan password)
      #        Cara buat token: hub.docker.com → Account Settings → Personal Access Tokens
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 4. Setup QEMU ─────────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 5. Setup Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Build & Push ───────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.FULL_IMAGE }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print summary ──────────────────────────────────────────────────
      - name: Print image info
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Image berhasil di-push!"
          echo "   Image : ${{ steps.vars.outputs.FULL_IMAGE }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"
          echo "════════════════════════════════════════"
          echo ""
          echo "Update deployment.yaml dengan:"
          echo "  image: ${{ steps.vars.outputs.FULL_IMAGE }}"
