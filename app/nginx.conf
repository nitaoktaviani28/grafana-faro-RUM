server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy Faro beacon ke Alloy ──────────────────────────────────────────
    # Browser kirim ke /faro/collect (same-origin, no CORS issue)
    # Nginx forward ke Alloy service di dalam cluster via DNS
    #
    # Alloy service: alloy.monitoring.svc.cluster.local:12347
    # (Port 12347 harus sudah ditambahkan via alloy-service-patch.yaml)
    location /faro/collect {
        proxy_pass         http://alloy.monitoring.svc.cluster.local:12347/collect;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type $content_type;

        # Timeout untuk beacon (biasanya cepat)
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;

        # Kalau Alloy unavailable, jangan error ke browser
        proxy_next_upstream error timeout;

        # CORS (untuk kasus direct access tanpa Ingress)
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
